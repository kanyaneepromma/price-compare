<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือเปรียบเทียบราคาต่อความจุ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) 120px;
            gap: 15px;
            margin-bottom: 25px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
        }
        .input-field label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #7f8c8d;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
        .btn-main {
            border: none;
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-end;
            height: 41px;
        }
        .btn-main:hover {
            background-color: #2980b9;
        }
        .btn-save-edit {
            background-color: #e67e22;
        }
        .btn-save-edit:hover {
            background-color: #d35400;
        }
        .content-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        @media (min-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr 1fr;
            }
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f4f7;
            color: #34495e;
        }
        .best-deal {
            background-color: #d4edda !important;
            color: #155724;
            font-weight: bold;
        }
        .badge {
            background: #28a745;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 5px;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .action-btn {
            border: none;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .edit-btn {
            background-color: #f39c12;
        }
        .edit-btn:hover {
            background-color: #d35400;
        }
        .delete-btn {
            background-color: #e74c3c;
        }
        .delete-btn:hover {
            background-color: #c0392b;
        }
        canvas {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>แอปเปรียบเทียบ ยี่ห้อ / ความจุ / ราคา</h2>
    
    <div class="form-group">
        <div class="input-field">
            <label>ยี่ห้อ (Brand)</label>
            <input type="text" id="brand" placeholder="เช่น ยี่ห้อ A" value="ยี่ห้อ A">
        </div>
        <div class="input-field">
            <label>ความจุ (เช่น ลิตร, กก.)</label>
            <input type="number" id="capacity" placeholder="เช่น 29" value="29" min="0.01" step="any">
        </div>
        <div class="input-field">
            <label>ราคารวม (บาท)</label>
            <input type="number" id="price" placeholder="เช่น 580" value="580" min="0" step="any">
        </div>
        <button id="submitBtn" class="btn-main" onclick="handleSubmit()">เพิ่มรายการ</button>
    </div>

    <div class="content-layout">
        <div>
            <h3>รายการที่เปรียบเทียบ</h3>
            <table id="itemTable">
                <thead>
                    <tr>
                        <th>ยี่ห้อ</th>
                        <th>ความจุ</th>
                        <th>ราคารวม</th>
                        <th>ราคาต่อ 1 หน่วย</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
        
        <div>
            <h3>แผนภูมิแสดงราคาต่อหน่วย (Canvas)</h3>
            <canvas id="chartCanvas" width="400" height="300"></canvas>
        </div>
    </div>
</div>

<script>
    // Initial data
    let items = [
        { brand: "ยี่ห้อ A (ตัวอย่าง)", capacity: 29, price: 580 },
        { brand: "ยี่ห้อ B (ตัวอย่าง)", capacity: 10, price: 250 },
        { brand: "ยี่ห้อ C (ตัวอย่าง)", capacity: 35, price: 630 }
    ];

    let editIndex = -1; // -1 means we are adding a new item, otherwise it holds the index of item being edited

    function calculateUnitPrice(item) {
        if (!item.capacity || item.capacity <= 0) return 0;
        return item.price / item.capacity;
    }

    function handleSubmit() {
        const brandInput = document.getElementById('brand');
        const capInput = document.getElementById('capacity');
        const priceInput = document.getElementById('price');

        const brand = brandInput.value.trim();
        const capacity = parseFloat(capInput.value);
        const price = parseFloat(priceInput.value);

        if (!brand || isNaN(capacity) || isNaN(price) || capacity <= 0) {
            alert("กรุณากรอกข้อมูลให้ถูกต้องครบถ้วน และความจุต้องมากกว่า 0");
            return;
        }

        if (editIndex === -1) {
            // Add mode
            items.push({ brand, capacity, price });
        } else {
            // Edit mode
            items[editIndex] = { brand, capacity, price };
            editIndex = -1; // Reset mode
            
            // Reset button styling
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "เพิ่มรายการ";
            submitBtn.className = "btn-main";
        }
        
        // Reset inputs
        brandInput.value = '';
        capInput.value = '';
        priceInput.value = '';
        
        updateApp();
    }

    function startEdit(index) {
        editIndex = index;
        const item = items[index];
        
        // Pop values back into the text fields
        document.getElementById('brand').value = item.brand;
        document.getElementById('capacity').value = item.capacity;
        document.getElementById('price').value = item.price;
        
        // Change the look and text of the button to alert user they are editing
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "บันทึกแก้ไข";
        submitBtn.className = "btn-main btn-save-edit";
        
        // Scroll smoothly to form so user sees it
        document.getElementById('brand').focus();
    }

    function deleteItem(index) {
        // If they delete an item while editing it, cancel the edit mode
        if (editIndex === index) {
            editIndex = -1;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "เพิ่มรายการ";
            submitBtn.className = "btn-main";
            document.getElementById('brand').value = '';
            document.getElementById('capacity').value = '';
            document.getElementById('price').value = '';
        } else if (editIndex > index) {
            // Adjust index tracker if an earlier item was removed
            editIndex--;
        }

        items.splice(index, 1);
        updateApp();
    }

    function updateApp() {
        let lowestPricePerUnit = Infinity;
        let bestIndex = -1;

        items.forEach((item, index) => {
            const unitPrice = calculateUnitPrice(item);
            if (unitPrice < lowestPricePerUnit && unitPrice > 0) {
                lowestPricePerUnit = unitPrice;
                bestIndex = index;
            }
        });

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        items.forEach((item, index) => {
            const unitPrice = calculateUnitPrice(item);
            const isBest = index === bestIndex;
            
            const row = document.createElement('tr');
            if (isBest) row.className = 'best-deal';

            row.innerHTML = `
                <td>${item.brand} ${isBest ? '<span class="badge">คุ้มสุด!</span>' : ''}</td>
                <td>${item.capacity}</td>
                <td>${item.price.toFixed(2)} บ.</td>
                <td><strong>${unitPrice.toFixed(2)}</strong> บ./หน่วย</td>
                <td>
                    <div class="action-btns">
                        <button class="action-btn edit-btn" onclick="startEdit(${index})">แก้ไข</button>
                        <button class="action-btn delete-btn" onclick="deleteItem(${index})">ลบ</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });

        drawChart(bestIndex);
    }

    function drawChart(bestIndex) {
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (items.length === 0) {
            ctx.fillStyle = "#7f8c8d";
            ctx.font = "14px sans-serif";
            ctx.fillText("ไม่มีข้อมูลสำหรับแสดงแผนภูมิ", 50, 150);
            return;
        }

        let maxUnitPrice = 0;
        items.forEach(item => {
            const up = calculateUnitPrice(item);
            if (up > maxUnitPrice) maxUnitPrice = up;
        });

        const startX = 100;
        const startY = 40;
        const barMaxHeight = 200; 
        const barWidth = 40;
        const spacing = 30;

        ctx.strokeStyle = "#e1e8ed";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
            let y = startY + barMaxHeight - (barMaxHeight * (i / 4));
            ctx.beginPath();
            ctx.moveTo(startX - 10, y);
            ctx.lineTo(canvas.width - 20, y);
            ctx.stroke();
            
            ctx.fillStyle = "#7f8c8d";
            ctx.font = "10px sans-serif";
            ctx.fillText(((maxUnitPrice * (i / 4)) || 0).toFixed(1), 10, y + 4);
        }

        items.forEach((item, index) => {
            const unitPrice = calculateUnitPrice(item);
            const barHeight = maxUnitPrice > 0 ? (unitPrice / maxUnitPrice) * barMaxHeight : 0;
            
            const x = startX + index * (barWidth + spacing);
            const y = startY + barMaxHeight - barHeight;

            ctx.fillStyle = (index === bestIndex) ? "#2ecc71" : "#3498db";
            ctx.fillRect(x, y, barWidth, barHeight);

            ctx.fillStyle = "#2c3e50";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(unitPrice.toFixed(1), x + barWidth/2, y - 8);

            ctx.save();
            ctx.translate(x + barWidth/2, startY + barMaxHeight + 15);
            ctx.rotate(-Math.PI / 12);
            ctx.fillStyle = "#34495e";
            ctx.font = "11px sans-serif";
            ctx.textAlign = "right";
            let displayName = item.brand.length > 10 ? item.brand.substring(0, 8) + '..' : item.brand;
            ctx.fillText(displayName, 0, 0);
            ctx.restore();
        });
    }

    updateApp();
</script>

</body>
</html>
